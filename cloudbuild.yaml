steps:
  # Notify Slack — build started
  - name: 'curlimages/curl'
    id: notify-start
    entrypoint: curl
    args:
      - '-s'
      - '-X'
      - 'POST'
      - '-H'
      - 'Content-Type: application/json'
      - '-d'
      - |
        {"text": "🚀 *Build started*", "attachments": [{"color": "#439FE0", "fields": [{"title": "Commit", "value": "$COMMIT_SHA", "short": true}, {"title": "Branch", "value": "$BRANCH_NAME", "short": true}]}]}
      - '${_SLACK_WEBHOOK_URL}'

  # Build the image
  - name: 'gcr.io/cloud-builders/docker'
    id: build
    args:
      - build
      - -t
      - us-east1-docker.pkg.dev/clinicalcopilot/cloud-run-source-deploy/lyralabs-cleint-app/lyralabs-app:$COMMIT_SHA
      - -t
      - us-east1-docker.pkg.dev/clinicalcopilot/cloud-run-source-deploy/lyralabs-cleint-app/lyralabs-app:latest
      - .
    waitFor: [notify-start]

  # Push both tags
  - name: 'gcr.io/cloud-builders/docker'
    id: push
    args:
      - push
      - --all-tags
      - us-east1-docker.pkg.dev/clinicalcopilot/cloud-run-source-deploy/lyralabs-cleint-app/lyralabs-app
    waitFor: [build]

  # Notify Slack — build complete
  - name: 'curlimages/curl'
    id: notify-build-done
    entrypoint: curl
    args:
      - '-s'
      - '-X'
      - 'POST'
      - '-H'
      - 'Content-Type: application/json'
      - '-d'
      - |
        {"text": "🐳 *Build complete* — image pushed to Artifact Registry", "attachments": [{"color": "#439FE0", "fields": [{"title": "Commit", "value": "$COMMIT_SHA", "short": true}]}]}
      - '${_SLACK_WEBHOOK_URL}'
    waitFor: [push]

  # Deploy to Cloud Run (API)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-cloudrun
    entrypoint: gcloud
    args:
      - run
      - deploy
      - lyralabs-app
      - --image=us-east1-docker.pkg.dev/clinicalcopilot/cloud-run-source-deploy/lyralabs-cleint-app/lyralabs-app:$COMMIT_SHA
      - --region=us-east1
      - --project=clinicalcopilot
      - --quiet
    waitFor: [push]

  # Deploy to VM worker via direct SSH
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: deploy-worker
    entrypoint: bash
    args:
      - '-c'
      - |
        DIGEST=$(gcloud artifacts docker images describe \
          us-east1-docker.pkg.dev/clinicalcopilot/cloud-run-source-deploy/lyralabs-cleint-app/lyralabs-app:$COMMIT_SHA \
          --format="value(image_summary.digest)" \
          --project=clinicalcopilot)
        SHA=$${DIGEST#sha256:}
        gcloud secrets versions access latest \
          --secret=cloudbuild-ssh-key \
          --project=clinicalcopilot > /tmp/cb_ssh_key
        chmod 600 /tmp/cb_ssh_key
        ssh -i /tmp/cb_ssh_key \
          -o StrictHostKeyChecking=no \
          muhammadsahil564@34.75.67.127 \
          "sh ~/lyralabs/deploy.sh $$SHA"
        rm /tmp/cb_ssh_key
    waitFor: [deploy-cloudrun]

  # Notify Slack — deployed successfully
  - name: 'curlimages/curl'
    id: notify-success
    entrypoint: curl
    args:
      - '-s'
      - '-X'
      - 'POST'
      - '-H'
      - 'Content-Type: application/json'
      - '-d'
      - |
        {"text": "✅ *Deployed successfully* — Cloud Run + VM worker updated", "attachments": [{"color": "good", "fields": [{"title": "Commit", "value": "$COMMIT_SHA", "short": true}, {"title": "Branch", "value": "$BRANCH_NAME", "short": true}]}]}
      - '${_SLACK_WEBHOOK_URL}'
    waitFor: [deploy-worker]

images:
  - us-east1-docker.pkg.dev/clinicalcopilot/cloud-run-source-deploy/lyralabs-cleint-app/lyralabs-app:$COMMIT_SHA
  - us-east1-docker.pkg.dev/clinicalcopilot/cloud-run-source-deploy/lyralabs-cleint-app/lyralabs-app:latest

substitutions:
  _SLACK_WEBHOOK_URL: ''

options:
  logging: CLOUD_LOGGING_ONLY
