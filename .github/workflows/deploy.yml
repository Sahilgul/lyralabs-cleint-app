name: Deploy VM Worker

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Notify Slack — deployment started
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🚀 *VM worker deployment started*",
              "attachments": [{
                "color": "#439FE0",
                "fields": [
                  { "title": "Triggered by", "value": "${{ github.actor }}", "short": true },
                  { "title": "Branch", "value": "${{ github.ref_name }}", "short": true },
                  { "title": "Commit", "value": "<https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>" }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Deploy to VM worker
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          script: |
            cd ~/lyralabs
            docker compose stop worker
            docker image prune -a -f
            docker compose pull worker
            docker compose up -d --force-recreate worker
            docker compose logs --tail=20 worker

      - name: Notify Slack — deployed successfully
        if: success()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "✅ *VM worker deployed successfully*",
              "attachments": [{
                "color": "good",
                "fields": [
                  { "title": "Triggered by", "value": "${{ github.actor }}", "short": true },
                  { "title": "Branch", "value": "${{ github.ref_name }}", "short": true },
                  { "title": "Commit", "value": "<https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>" },
                  { "title": "Logs", "value": "<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>" }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

      - name: Notify Slack — deployment failed
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "❌ *VM worker deployment failed*",
              "attachments": [{
                "color": "danger",
                "fields": [
                  { "title": "Triggered by", "value": "${{ github.actor }}", "short": true },
                  { "title": "Branch", "value": "${{ github.ref_name }}", "short": true },
                  { "title": "Commit", "value": "<https://github.com/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>" },
                  { "title": "Logs", "value": "<https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>" }
                ]
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
