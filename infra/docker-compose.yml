name: lyralabs

services:
  postgres:
    image: postgres:16-alpine
    container_name: lyralabs-postgres
    environment:
      POSTGRES_USER: lyralabs
      POSTGRES_PASSWORD: lyralabs
      POSTGRES_DB: lyralabs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lyralabs"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: lyralabs-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: lyralabs-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: lyralabs-api
    env_file: ../.env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../packages:/app/packages
      - ../apps/api:/app/apps/api
    command: ["uvicorn", "apps.api.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  worker:
    build:
      context: ..
      dockerfile: apps/worker/Dockerfile
    container_name: lyralabs-worker
    env_file: ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../packages:/app/packages
      - ../apps/worker:/app/apps/worker
    command: ["celery", "-A", "apps.worker.celery_app:celery", "worker", "--loglevel=INFO", "--concurrency=4"]

volumes:
  postgres_data:
  qdrant_data:
