# Slack App Manifest. Import at https://api.slack.com/apps -> "From an app manifest".
# Replace <YOUR_DOMAIN> after deploying.
display_information:
  name: ARLO
  description: Your team's autonomous AI coworker for GoHighLevel + Google Workspace
  background_color: "#0f172a"
features:
  app_home:
    home_tab_enabled: true
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
  bot_user:
    display_name: ARLO
    always_online: true
  slash_commands:
    - command: /arlo
      url: https://<YOUR_DOMAIN>/slack/events
      description: Ask ARLO to do something
      usage_hint: "summarize the last 7 days of leads in our GHL pipeline"
      should_escape: false
oauth_config:
  redirect_urls:
    - https://<YOUR_DOMAIN>/oauth/slack/callback
  scopes:
    bot:
      - app_mentions:read
      - channels:history
      - channels:read
      - chat:write
      - commands
      - files:write
      - groups:history
      - im:history
      - im:read
      - im:write
      - users:read
settings:
  event_subscriptions:
    request_url: https://<YOUR_DOMAIN>/slack/events
    bot_events:
      - app_mention
      - message.im
      - app_uninstalled
      - tokens_revoked
  interactivity:
    is_enabled: true
    request_url: https://<YOUR_DOMAIN>/slack/events
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: true
