# Place this at .github/workflows/deploy.yml
# Requires:
#   - Workload Identity Federation (provider in WIF_PROVIDER, sa email in WIF_SA)
#   - Artifact Registry repo `lyralabs` in REGION
#   - Secret Manager secret `lyralabs-env`
#
# The Vite admin UI is bundled into the api image (see ./Dockerfile),
# so we only deploy two Cloud Run services: api and worker.
name: deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGION: us-central1
  PROJECT_ID: REPLACE_ME
  AR: us-central1-docker.pkg.dev

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - { name: api, dockerfile: Dockerfile, port: 8000 }
          - { name: worker, dockerfile: Dockerfile, port: 0 }
    steps:
      - uses: actions/checkout@v4
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SA }}
      - uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker
        run: gcloud auth configure-docker ${{ env.AR }} -q

      - name: Build & push
        run: |
          IMAGE=${{ env.AR }}/${{ env.PROJECT_ID }}/lyralabs/${{ matrix.service.name }}:${{ github.sha }}
          docker build -f ${{ matrix.service.dockerfile }} -t $IMAGE .
          docker push $IMAGE

      - name: Deploy
        run: |
          gcloud run deploy lyralabs-${{ matrix.service.name }} \
            --image=${{ env.AR }}/${{ env.PROJECT_ID }}/lyralabs/${{ matrix.service.name }}:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --platform=managed \
            --quiet
