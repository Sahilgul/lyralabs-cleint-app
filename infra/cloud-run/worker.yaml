apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: lyralabs-worker
  annotations:
    run.googleapis.com/ingress: internal
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "10"
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 1
      timeoutSeconds: 900
      serviceAccountName: lyralabs-worker@PROJECT_ID.iam.gserviceaccount.com
      containers:
        - image: REGION-docker.pkg.dev/PROJECT_ID/lyralabs/worker:GIT_SHA
          resources:
            limits:
              cpu: "2"
              memory: 2Gi
          envFrom:
            - secretRef:
                name: lyralabs-env
